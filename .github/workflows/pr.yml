name: CI

on:
  pull_request:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to clone from agoric-to-axelar-local'
        required: false
        default: 'main'

jobs:
  axelar-gmp:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install docker-compose
        run: |
          sudo curl -L "https://github.com/docker/compose/releases/download/1.29.2/docker-compose-$(uname -s)-$(uname -m)" \
            -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose
          docker-compose version

      - name: Set branch name
        id: set-branch
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "branch=${{ github.event.inputs.branch }}" >> $GITHUB_OUTPUT
          else
            echo "branch=main" >> $GITHUB_OUTPUT
          fi

      - name: Clone agoric-to-axelar-local
        run: |
          git clone --branch "${{ steps.set-branch.outputs.branch }}" https://github.com/agoric-labs/agoric-to-axelar-local.git

      - name: Install dependencies
        run: |
          cd agoric-to-axelar-local
          npm install

      - name: Build project
        run: |
          cd agoric-to-axelar-local
          npm run build

      - name: Start Chains and set Relayer
        run: |
          cd agoric-to-axelar-local/packages/axelar-local-dev-cosmos
          npm run start

      - name: Clone multichain-testing folder into container
        run: |
          git clone https://github.com/Agoric/agoric-sdk.git temp-agoric-sdk
          docker cp temp-agoric-sdk/multichain-testing agoric:/usr/src/agoric-sdk/multichain-testing
          rm -rf temp-agoric-sdk

      - name: Install & build multichain-testing in container
        run: |
          docker exec agoric bash -c "cd /usr/src/agoric-sdk && yarn install"

      - name: Generate bundles for registering AXL
        run: |
          docker exec agoric agoric run \
            /usr/src/agoric-sdk/multichain-testing/src/register-interchain-bank-assets.builder.js \
            --assets='[
              {
                "denom": "ibc/2CC0B1B7A981ACC74854717F221008484603BB8360E81B262411B0D830EDE9B0",
                "issuerName": "AXL",
                "decimalPlaces": 6
              }
            ]'

      - name: Check if generated files exist in container
        run: |
          docker exec agoric sh -c '
            ls -l /usr/src/upgrade-test-scripts/eval-register-interchain-bank-assets*
          '

      - name: Copy deploy.sh into container
        run: |
          docker cp deploy.sh agoric:/usr/src/upgrade-test-scripts/deploy.sh

      - name: Register AXL in vbankAssets
        run: |
          docker exec agoric sh -c '
            bash /usr/src/upgrade-test-scripts/deploy.sh \
              /usr/src/upgrade-test-scripts/eval-register-interchain-bank-assets-plan.json \
              CI=true createVault=false dockerFlag=false
          '
